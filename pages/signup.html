<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원가입 - 아힘하</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body data-root="..">
  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="아힘하 홈"><strong>아힘하</strong><span>공구 운영 도우미</span></a>
    <button class="menu-toggle" type="button" aria-label="메뉴 열기">메뉴</button>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a href="../index.html">홈</a><a href="./services.html">서비스</a><a href="./guide.html">이용가이드</a><a href="./notice.html">공지사항</a><a href="./support.html">고객센터</a>
    </nav>
    <div class="account-actions">
      <a class="ghost-button" href="./find-account.html">ID/PW 찾기</a>
      <a class="ghost-button" href="./login.html">로그인</a>
      <a class="solid-button is-active" href="./signup.html">회원가입</a>
      <a class="cart-link" href="./cart.html">장바구니 <span class="cart-badge" data-cart-count>0</span></a>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-panel">
      <p class="eyebrow dark">회원가입</p>
      <h1>재구매와 주문 관리를 위한 계정 자리입니다.</h1>
      <p>회원가입 화면은 준비되어 있고, 실제 가입 처리는 백엔드 연결 후 활성화할 수 있습니다.</p>
      <form class="auth-form" data-fake-form>
        <label>이름<input type="text" placeholder="이름"></label>
        <label>이메일<input type="email" placeholder="hello@example.com"></label>
        <label>비밀번호<input type="password" placeholder="8자 이상 입력"></label>
        <button class="primary-button" type="submit">가입하기</button>
      </form>
      <div class="auth-links"><a href="./login.html">이미 계정이 있어요</a></div>
    </section>
  </main>

  <script src="../script.js"></script>
</body>
</html>
