<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>결제 준비 - 아힘하</title>
  <meta name="description" content="아힘하 서비스 결제 준비 화면입니다.">
  <link rel="stylesheet" href="../styles.css">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body data-root="..">
  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="아힘하 홈"><strong>아힘하</strong><span>공구 운영 도우미</span></a>
    <button class="menu-toggle" type="button" aria-label="메뉴 열기">메뉴</button>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a href="../index.html">홈</a>
      <a href="./services.html">서비스</a>
      <a href="./guide.html">이용가이드</a>
      <a href="./notice.html">공지사항</a>
      <a href="./support.html">고객센터</a>
    </nav>
    <div class="account-actions">
      <a class="ghost-button" href="./find-account.html">ID/PW 찾기</a>
      <a class="ghost-button" href="./login.html">로그인</a>
      <a class="solid-button" href="./signup.html">회원가입</a>
      <a class="cart-link" href="./cart.html">장바구니 <span class="cart-badge" data-cart-count>0</span></a>
    </div>
  </header>

  <main class="subpage">
    <section class="page-hero compact-hero">
      <p class="eyebrow dark">결제 준비</p>
      <h1>실제 결제 연결 전, 주문 접수 흐름을 먼저 완성했습니다.</h1>
      <p>결제대행사 또는 결제 링크를 받으면 이 화면의 마지막 버튼을 실제 결제/문의 접수로 연결할 수 있습니다.</p>
    </section>

    <section class="section checkout-section">
      <form class="checkout-form" data-fake-form>
        <h2>주문자 정보</h2>
        <label>이름 또는 브랜드명
          <input type="text" placeholder="예: 감귤공구마켓">
        </label>
        <label>연락 받을 곳
          <input type="text" placeholder="이메일, 카카오톡, 인스타그램 ID">
        </label>
        <label>판매 채널
          <select>
            <option>인스타그램 공구</option>
            <option>스마트스토어</option>
            <option>카카오톡 채널</option>
            <option>블로그/카페</option>
            <option>기타</option>
          </select>
        </label>
        <label>요청사항
          <textarea rows="6" placeholder="판매 상품, 공구 일정, 필요한 문구, 현재 사용 중인 주문 방식을 적어주세요."></textarea>
        </label>
        <button class="primary-button" type="submit">주문 상담 접수하기</button>
      </form>

      <aside class="checkout-summary">
        <h2>담은 서비스</h2>
        <div id="checkoutItems" class="checkout-items"></div>
        <div class="summary-row"><span>예상 합계</span><strong id="checkoutTotal">0원</strong></div>
        <p>실제 금액은 작업 범위 확인 후 조정될 수 있습니다.</p>
        <a class="link-button center-link" href="./cart.html">장바구니 수정하기</a>
      </aside>
    </section>
  </main>

  <footer class="footer">
    <div><strong>아힘하</strong><p>공구 판매자와 온라인 초보 셀러를 위한 운영 도우미</p></div>
    <div class="footer-links"><a href="#" aria-disabled="true">Instagram 준비중</a><a href="#" aria-disabled="true">KakaoTalk 준비중</a><a href="./support.html">고객센터</a></div>
  </footer>
  <script src="../script.js"></script>
</body>
</html>
