<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 - 아힘하</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body data-root="..">
  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="아힘하 홈"><strong>아힘하</strong><span>공구 운영 도우미</span></a>
    <button class="menu-toggle" type="button" aria-label="메뉴 열기">메뉴</button>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a href="../index.html">홈</a><a href="./services.html">서비스</a><a href="./guide.html">이용가이드</a><a href="./notice.html">공지사항</a><a href="./support.html">고객센터</a>
    </nav>
    <div class="account-actions">
      <a class="ghost-button" href="./find-account.html">ID/PW 찾기</a>
      <a class="ghost-button is-active" href="./login.html">로그인</a>
      <a class="solid-button" href="./signup.html">회원가입</a>
      <a class="cart-link" href="./cart.html">장바구니 <span class="cart-badge" data-cart-count>0</span></a>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-panel">
      <p class="eyebrow dark">로그인</p>
      <h1>회원 기능 연결을 준비 중입니다.</h1>
      <p>지금은 화면 구조만 먼저 만들어둔 상태입니다. 실제 회원 데이터베이스를 연결하면 이 페이지에서 로그인할 수 있습니다.</p>
      <form class="auth-form" data-fake-form>
        <label>아이디 또는 이메일<input type="text" placeholder="hello@example.com"></label>
        <label>비밀번호<input type="password" placeholder="비밀번호"></label>
        <button class="primary-button" type="submit">로그인</button>
      </form>
      <div class="auth-links">
        <a href="./find-account.html">ID/PW 찾기</a>
        <a href="./signup.html">회원가입</a>
      </div>
    </section>
  </main>

  <script src="../script.js"></script>
</body>
</html>
